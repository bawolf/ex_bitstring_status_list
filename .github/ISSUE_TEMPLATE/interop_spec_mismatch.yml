name: Interop or spec mismatch
description: Report a mismatch between ex_bitstring_status_list and spec or ecosystem behavior
title: "[Interop] "
labels:
  - interop
body:
  - type: dropdown
    id: source
    attributes:
      label: Mismatch source
      options:
        - W3C spec text or example
        - TypeScript implementation
        - Rust implementation
        - Multiple sources disagree
    validations:
      required: true
  - type: textarea
    id: surface
    attributes:
      label: Affected surface
      description: Entry parsing, credential shape, revocation check, or fixture behavior.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include fixture ids, links, and observed outputs.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected contract
      description: Which oracle should win, and why?
